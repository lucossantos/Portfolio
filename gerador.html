<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfólio de Lucas Santos, estudante de Análise e Desenvolvimento de Sistemas com projetos em HTML, CSS, JavaScript, Python e análise de dados.">
  <meta name="author" content="Lucas Santos">
  <title>Gerador de Senhas | Lucas Santos</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="shortcut icon" href="assets/imagens/logo_pessoal.png" type="image/png" />
</head>

<body>
  <header class="container-cabecalho">
    <a href="index.html">
      <img src="assets/imagens/logo_pessoal.png" alt="Logo pessoal" />
    </a>
    <h1>Gerador de Senhas Aleatórias</h1>
    <p>Gere senhas seguras com um clique!</p>
  </header>

  <nav class="container-navegacao">
    <a href="index.html">Sobre mim</a>
    <a href="projetos.html">Projetos</a>
    <a href="contato.html">Contato</a>
  </nav>

  <main class="container-quem-sou">
    <section class="sobre">
      <h2>Gerar uma nova senha</h2>

      <label for="tamanho">Tamanho da senha:</label><br>
      <input type="number" id="tamanho" value="12" min="4" max="64" /><br><br>

      <fieldset style="border: none; padding: 0; margin-bottom: 20px;">
        <legend><strong>Escolha os tipos de caracteres:</strong></legend><br>

        <label>
          <input type="checkbox" id="usar-letras" checked />
          Letras
        </label><br>

        <label>
          <input type="checkbox" id="usar-numeros" checked />
          Números
        </label><br>

        <label>
          <input type="checkbox" id="usar-simbolos" checked />
          Símbolos
        </label>
      </fieldset>

      <button type="button" onclick="mostrarSenha()">Gerar Senha</button>
      <button type="button" onclick="copiarSenha()">Copiar Senha</button><br><br>

      <p><strong>Senha gerada:</strong></p>
      <p id="senha-gerada" style="word-break: break-all; font-weight: bold;"></p>
      <p id="mensagem" aria-live="polite" style="font-weight: bold;"></p>
    </section>
  </main>

  <footer>
    <p>© <span id="ano"></span> Lucas Santos. Todos os direitos reservados.</p>
  </footer>

  <script>
    document.getElementById("ano").textContent = new Date().getFullYear();
  </script>

  <script>
    function obterIndiceSeguro(tamanhoMaximo) {
      const array = new Uint32Array(1);
      window.crypto.getRandomValues(array);
      return array[0] % tamanhoMaximo;
    }

    function gerarSenha(length = 12) {
      const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
      const numeros = "0123456789";
      const simbolos = "!@#$%^&*()_+[]{}<>?,.";

      const usarLetras = document.getElementById("usar-letras").checked;
      const usarNumeros = document.getElementById("usar-numeros").checked;
      const usarSimbolos = document.getElementById("usar-simbolos").checked;

      let caracteres = "";

      if (usarLetras) {
        caracteres += letras;
      }

      if (usarNumeros) {
        caracteres += numeros;
      }

      if (usarSimbolos) {
        caracteres += simbolos;
      }

      if (caracteres.length === 0) {
        return "";
      }

      let senha = "";

      for (let i = 0; i < length; i++) {
        const index = obterIndiceSeguro(caracteres.length);
        senha += caracteres[index];
      }

      return senha;
    }

    function mostrarSenha() {
      const tamanho = parseInt(document.getElementById("tamanho").value);
      const senhaGerada = document.getElementById("senha-gerada");
      const mensagem = document.getElementById("mensagem");

      mensagem.textContent = "";

      if (isNaN(tamanho) || tamanho < 4 || tamanho > 64) {
        senhaGerada.textContent = "";
        mensagem.textContent = "Escolha um tamanho entre 4 e 64 caracteres.";
        return;
      }

      const senha = gerarSenha(tamanho);

      if (!senha) {
        senhaGerada.textContent = "";
        mensagem.textContent = "Selecione pelo menos uma opção: letras, números ou símbolos.";
        return;
      }

      senhaGerada.textContent = senha;
    }

    async function copiarSenha() {
      const senha = document.getElementById("senha-gerada").textContent;
      const mensagem = document.getElementById("mensagem");

      if (!senha) {
        mensagem.textContent = "Gere uma senha antes de copiar.";
        return;
      }

      try {
        await navigator.clipboard.writeText(senha);
        mensagem.textContent = "Senha copiada com sucesso!";
      } catch (error) {
        mensagem.textContent = "Não foi possível copiar a senha automaticamente.";
      }
    }
  </script>
</body>

</html>
